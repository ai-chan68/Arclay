name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    uses: ./.github/workflows/quality-gates.yml

  build-matrix:
    needs:
      - quality-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            pkg_target: node20-linux-x64
          - target: windows
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            pkg_target: node20-win-x64
          - target: macos-intel
            os: macos-13
            rust_target: x86_64-apple-darwin
            pkg_target: node20-macos-x64
          - target: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            pkg_target: node20-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.77.2
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve build metadata
        id: metadata
        run: node ./scripts/write-build-metadata.mjs --target ${{ matrix.target }}

      - name: Build frontend
        run: pnpm build

      - name: Build API sidecar
        run: pnpm build:api --target ${{ matrix.pkg_target }}

      - name: Trim resources by platform
        run: node ./scripts/trim-resources-by-platform.mjs --target ${{ matrix.target }}

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Setting up code signing..."
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            rm certificate.p12
          else
            echo "No signing certificate configured, skipping code signing"
          fi

      - name: Build desktop package
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Prepare release artifacts and checksums
        run: >
          node ./scripts/prepare-release-assets.mjs
          --target ${{ matrix.target }}
          --version ${{ steps.metadata.outputs.version }}
          --commit ${{ steps.metadata.outputs.commit }}
          --timestamp ${{ steps.metadata.outputs.build_timestamp }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/release/${{ matrix.target }}/**
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - quality-gates
      - build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Show release asset inventory
        run: ls -R release-assets

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          fail_on_unmatched_files: true
          generate_release_notes: true
