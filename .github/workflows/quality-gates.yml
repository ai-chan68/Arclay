name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint gate
        run: pnpm lint

      - name: Run typecheck gate
        run: pnpm typecheck

      - name: Run test gate
        run: pnpm test

      - name: Run smoke gate with API bootstrap
        run: pnpm smoke:desktop:with-api

      - name: Upload quality gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-logs
          path: .quality-gates/**
          if-no-files-found: warn
