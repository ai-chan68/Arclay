name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint gate
        run: pnpm lint

      - name: Run typecheck gate
        run: pnpm typecheck

      - name: Run test gate
        run: pnpm test

      - name: Run smoke gate with API bootstrap
        run: pnpm smoke:desktop:with-api

      - name: Upload quality gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-logs
          path: .quality-gates/**
          if-no-files-found: warn

  build-matrix:
    needs:
      - quality-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            pkg_target: node18-linux-x64
          - target: windows
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            pkg_target: node18-win-x64
          - target: macos-intel
            os: macos-13
            rust_target: x86_64-apple-darwin
            pkg_target: node18-macos-x64
          - target: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            pkg_target: node18-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.77.2
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve build metadata
        id: metadata
        run: node ./scripts/write-build-metadata.mjs --target ${{ matrix.target }}

      - name: Build frontend
        run: pnpm build

      - name: Build API sidecar
        run: pnpm build:api --target ${{ matrix.pkg_target }}

      - name: Build desktop package
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Prepare release artifacts and checksums
        run: >
          node ./scripts/prepare-release-assets.mjs
          --target ${{ matrix.target }}
          --version ${{ steps.metadata.outputs.version }}
          --commit ${{ steps.metadata.outputs.commit }}
          --timestamp ${{ steps.metadata.outputs.build_timestamp }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/release/${{ matrix.target }}/**
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - quality-gates
      - build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Show release asset inventory
        run: ls -R release-assets

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          fail_on_unmatched_files: true
          generate_release_notes: true
