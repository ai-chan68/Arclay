name: Quality Gates

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run lint gate
        run: pnpm lint

      - name: Run typecheck gate
        run: pnpm typecheck

      - name: Run test gate
        run: pnpm test

      - name: Run coverage gate
        run: pnpm test:coverage

      - name: Run smoke gate with API bootstrap
        run: pnpm smoke:desktop:with-api

      - name: Run desktop e2e gate
        run: pnpm test:e2e

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/agent-service/coverage/**
          if-no-files-found: warn

      - name: Upload quality gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-logs
          path: .quality-gates/**
          if-no-files-found: warn

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/**
          if-no-files-found: warn
